<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NetHub Coach Analysis</title>


  <!-- REQUIRED BUILDFIRE SDK SCRIPTS -->
  
  
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">


  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F7F9F8; color: #0D1A16; min-height: 100vh; padding-bottom: 32px; margin: 0 !important; }
    :root {
      --gd: #0A4D3A; --gm: #0F6E56; --gb: #1D9E75; --gl: #D4F0E5; --gp: #EAF7F2;
      --ow: #F7F9F8; --g1: #F0F2F1; --g2: #E2E6E4; --g4: #9AADA6; --g6: #5C706A; --g8: #2C3D38; --bk: #0D1A16;
      --am: #F0A500; --amp: #FEF3DC; --amb: #F5D79A; --rd: #D94040; --rdp: #FEF0F0;
      --bp: #EAF2FB; --bb: #C5DCEF; --pp: #F0EEFF; --pb: #D5CCFF;
      --navy: #1A2E6E; --navyp: #E8ECFA; --navyb: #C5CCF0;
    }


    /* HEADER */
    .nh-hdr { background: var(--gd); padding: 20px 18px 22px; position: relative; overflow: hidden; }
    .nh-hdr::before { content:''; position:absolute; top:-50px; right:-50px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.04); pointer-events:none; }
    .nh-hdr::after { content:''; position:absolute; bottom:-30px; left:20px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.03); pointer-events:none; }
    .nh-hdr-in { position:relative; z-index:1; }
    .nh-brand { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .nh-icon { width:46px; height:46px; border-radius:13px; background:var(--gb); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; box-shadow:0 3px 10px rgba(0,0,0,0.25); }
    .nh-name { font-family:'Montserrat',sans-serif; font-size:20px; font-weight:700; color:#fff; letter-spacing:-0.01em; margin:0; }
    .nh-sub { font-size:11px; color:rgba(255,255,255,0.5); margin:2px 0 0; }
    .nh-tag { font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; color:rgba(255,255,255,0.45); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; }
    .nh-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:99px; padding:6px 13px; }
    .nh-dot { width:7px; height:7px; border-radius:50%; background:var(--gb); flex-shrink:0; }
